<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบบันทึกการฉีดยา Mixtard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f0fdf4;
        }
        .check-item:checked + label {
            text-decoration: line-through;
            color: #94a3b8;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- Header Area -->
    <div class="bg-emerald-600 text-white p-6 rounded-b-[2.5rem] shadow-lg sticky top-0 z-10">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">เช็คลิสต์ฉีดยา</h1>
                <p class="text-emerald-100 text-sm">ประจำวันที่ <span id="currentDate"></span></p>
            </div>
            <div class="bg-white/20 p-3 rounded-2xl">
                <span class="text-3xl">💉</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="p-4 mt-4 space-y-4">
        
        <!-- Progress Bar -->
        <div class="glass-morphism p-4 rounded-3xl shadow-sm border border-emerald-100">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-emerald-800">ความพร้อมของคุณ</span>
                <span id="progressText" class="text-sm font-bold text-emerald-600">0%</span>
            </div>
            <div class="w-full bg-emerald-100 h-3 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-emerald-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>

        <!-- Checklist Group -->
        <section class="space-y-3">
            <h2 class="text-gray-500 text-xs font-bold uppercase tracking-widest ml-2">ขั้นตอนที่ต้องทำ</h2>
            
            <!-- Item 1 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-gray-50 group active:scale-95 transition-transform">
                <input type="checkbox" id="step1" class="check-item w-6 h-6 rounded-full text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step1" class="ml-4 flex-1 font-medium text-gray-700">คลึงและคว่ำปากกาครบ 20 ครั้ง</label>
                <span class="text-2xl">🔄</span>
            </div>

            <!-- Item 2 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-gray-50 group active:scale-95 transition-transform">
                <input type="checkbox" id="step2" class="check-item w-6 h-6 rounded-full text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step2" class="ml-4 flex-1 font-medium text-gray-700">ไล่อากาศจนเห็นหยดน้ำยา</label>
                <span class="text-2xl">💧</span>
            </div>

            <!-- Item 3 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-gray-50 group active:scale-95 transition-transform">
                <input type="checkbox" id="step3" class="check-item w-6 h-6 rounded-full text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step3" class="ml-4 flex-1 font-medium text-gray-700">เช็ดทำความสะอาดจุดที่จะฉีด</label>
                <span class="text-2xl">✨</span>
            </div>

            <!-- Item 4 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-gray-50 group active:scale-95 transition-transform">
                <input type="checkbox" id="step4" class="check-item w-6 h-6 rounded-full text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step4" class="ml-4 flex-1 font-medium text-gray-700">ฉีดแล้วนับค้างไว้ 1-10</label>
                <span class="text-2xl">⏱️</span>
            </div>
        </section>

        <!-- Dynamic Note -->
        <div id="congrats" class="hidden p-6 bg-yellow-400 rounded-3xl text-center shadow-lg border-4 border-white animate-bounce">
            <span class="text-4xl mb-2 block">🎉</span>
            <h3 class="font-bold text-yellow-900">เก่งมากครับ!</h3>
            <p class="text-yellow-800 text-sm">คุณทำตามขั้นตอนครบถ้วนแล้ว</p>
        </div>

        <!-- Emergency Quick Dial -->
        <div class="p-6 bg-red-50 rounded-3xl border-2 border-red-200">
            <p class="text-red-700 text-sm font-bold flex items-center mb-3">
                <span class="mr-2">💡</span> หากรู้สึกหน้ามืด มือสั่น:
            </p>
            <div class="flex space-x-2">
                <div class="bg-white p-3 rounded-2xl flex-1 text-center border border-red-100">
                    <span class="block text-xl">🍬</span>
                    <span class="text-[10px] text-gray-500">อมลูกอม</span>
                </div>
                <div class="bg-white p-3 rounded-2xl flex-1 text-center border border-red-100">
                    <span class="block text-xl">🥤</span>
                    <span class="text-[10px] text-gray-500">ดื่มน้ำหวาน</span>
                </div>
                <a href="tel:1669" class="bg-red-600 p-3 rounded-2xl flex-1 text-center text-white shadow-md">
                    <span class="block text-xl">📞</span>
                    <span class="text-[10px] font-bold">โทร 1669</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Bottom Nav Dummy -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center rounded-t-3xl shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
        <button class="text-emerald-600 flex flex-col items-center">
            <span class="text-xl">📋</span>
            <span class="text-[10px]">บันทึก</span>
        </button>
        <button onclick="location.reload()" class="text-gray-400 flex flex-col items-center">
            <span class="text-xl">🔄</span>
            <span class="text-[10px]">เริ่มใหม่</span>
        </button>
    </nav>

    <script>
        // Set Current Date
        const d = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = d.toLocaleDateString('th-TH', options);

        // Progress Tracking
        const checkboxes = document.querySelectorAll('.check-item');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const congrats = document.getElementById('congrats');

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('.check-item:checked').length;
                const total = checkboxes.length;
                const percentage = Math.round((checkedCount / total) * 100);
                
                progressBar.style.width = percentage + '%';
                progressText.innerText = percentage + '%';

                if (percentage === 100) {
                    congrats.classList.remove('hidden');
                } else {
                    congrats.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
