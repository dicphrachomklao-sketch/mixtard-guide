<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบบันทึกการฉีดยา Mixtard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f0fdf4;
        }
        /* เมื่อติ๊กถูกแล้วให้ตัวหนังสือจางลง */
        .check-item:checked + label {
            text-decoration: line-through;
            color: #94a3b8;
        }
        /* ปรับแต่ง Checkbox ให้ใหญ่ขึ้นกดง่าย */
        input[type="checkbox"] {
            width: 2rem;
            height: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen pb-32">
    <!-- Header -->
    <div class="bg-emerald-600 text-white p-6 rounded-b-[2.5rem] shadow-lg sticky top-0 z-10">
        <div class="flex justify-between items-center mb-4">
            <a href="index.html" class="bg-white/20 px-4 py-2 rounded-xl text-sm font-bold border border-white/30">⬅️ กลับหน้าคู่มือ</a>
            <div class="text-right">
                <h1 class="text-xl font-bold">เช็คลิสต์ฉีดยา</h1>
                <p id="currentDate" class="text-[10px] opacity-90"></p>
            </div>
        </div>
        
        <!-- Progress Bar (แสดงตลอดเวลา) -->
        <div class="bg-white/20 p-3 rounded-2xl">
            <div class="flex justify-between items-center mb-1 text-[10px]">
                <span>ความคืบหน้า</span>
                <span id="progressText">0%</span>
            </div>
            <div class="w-full bg-emerald-900/30 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="p-4 mt-4 space-y-4">
        
        <h2 class="text-emerald-800 text-sm font-bold ml-2">กรุณาติ๊กให้ครบก่อนฉีด:</h2>

        <section class="space-y-3">
             <!-- Step 1 -->
             <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-emerald-50 active:bg-emerald-50 transition-colors">
                <input type="checkbox" id="step1" class="check-item rounded-lg text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step1" class="ml-4 flex-1 font-medium text-gray-700">คลึงและคว่ำปากกาครบ 20 ครั้ง</label>
                <span class="text-2xl">🔄</span>
            </div>

            <!-- Step 2 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-emerald-50 active:bg-emerald-50 transition-colors">
                <input type="checkbox" id="step2" class="check-item rounded-lg text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step2" class="ml-4 flex-1 font-medium text-gray-700">ไล่อากาศจนเห็นหยดน้ำยา</label>
                <span class="text-2xl">💧</span>
            </div>

            <!-- Step 3 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-emerald-50 active:bg-emerald-50 transition-colors">
                <input type="checkbox" id="step3" class="check-item rounded-lg text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step3" class="ml-4 flex-1 font-medium text-gray-700">เช็ดทำความสะอาดจุดที่จะฉีด</label>
                <span class="text-2xl">✨</span>
            </div>

            <!-- Step 4 -->
            <div class="flex items-center p-5 bg-white rounded-3xl shadow-sm border border-emerald-50 active:bg-emerald-50 transition-colors">
                <input type="checkbox" id="step4" class="check-item rounded-lg text-emerald-600 border-gray-300 focus:ring-emerald-500">
                <label for="step4" class="ml-4 flex-1 font-medium text-gray-700">ฉีดแล้วนับค้างไว้ 1-10 วินาที</label>
                <span class="text-2xl">⏱️</span>
            </div>
        </section>

        <!-- Message shown only when complete -->
        <div id="congrats" class="hidden p-8 bg-yellow-400 rounded-[2.5rem] text-center shadow-xl border-4 border-white animate-bounce my-6">
            <span class="text-5xl mb-2 block">🎉</span>
            <h3 class="font-bold text-yellow-900 text-xl">เก่งมากครับ!</h3>
            <p class="text-yellow-800">คุณทำถูกต้องครบถ้วนแล้ว</p>
        </div>

        <!-- Emergency Section -->
        <div class="p-6 bg-red-50 rounded-3xl border-2 border-red-100 mt-8">
            <p class="text-red-700 text-sm font-bold flex items-center mb-4">
                ⚠️ หากหน้ามืด ใจสั่น ให้รีบ:
            </p>
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm">
                    <span class="block text-2xl">🍬</span>
                    <span class="text-[10px] text-gray-600">อมลูกอม</span>
                </div>
                <div class="bg-white p-3 rounded-2xl text-center shadow-sm">
                    <span class="block text-2xl">🥤</span>
                    <span class="text-[10px] text-gray-600">ดื่มน้ำหวาน</span>
                </div>
                <a href="tel:1669" class="bg-red-600 p-3 rounded-2xl text-center text-white shadow-md active:scale-95 transition-transform">
                    <span class="block text-2xl">📞</span>
                    <span class="text-[10px] font-bold">1669</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center rounded-t-[2rem] shadow-2xl">
        <button onclick="location.reload()" class="flex flex-col items-center text-emerald-600">
            <span class="text-2xl">🔄</span>
            <span class="text-[10px] font-bold">เริ่มใหม่วันนี้</span>
        </button>
    </nav>

    <script>
        // วันที่ปัจจุบัน
        const d = new Date();
        document.getElementById('currentDate').innerText = d.toLocaleDateString('th-TH', { 
            year: 'numeric', month: 'long', day: 'numeric' 
        });

        // ระบบเช็คความคืบหน้า
        const checkboxes = document.querySelectorAll('.check-item');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const congrats = document.getElementById('congrats');

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('.check-item:checked').length;
                const total = checkboxes.length;
                const percentage = Math.round((checkedCount / total) * 100);
                
                // อัปเดตแถบสี
                progressBar.style.width = percentage + '%';
                progressText.innerText = percentage + '%';

                // ถ้าครบ 100% ให้แสดงปุ่มดีใจ
                if (percentage === 100) {
                    congrats.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    congrats.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
