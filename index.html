<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code คู่มือฉีดยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-sm w-full bg-white rounded-[3rem] shadow-2xl p-10 text-center border-4 border-blue-600">
        <h1 class="text-2xl font-bold text-blue-900 mb-2">สแกนรับคู่มือ</h1>
        <p class="text-gray-600 mb-8">บันทึกคู่มือการฉีดยาไว้ในมือถือ</p>
        
        <!-- QR Code Container -->
        <div id="qrcode" class="flex justify-center mb-8 p-4 bg-white rounded-2xl shadow-inner border-2 border-dashed border-blue-200"></div>
        
        <div class="space-y-4">
            <p class="text-sm text-blue-700 bg-blue-50 py-2 rounded-full font-medium">รพ.พระจอมเกล้า จ.เพชรบุรี</p>
            <button onclick="window.history.back()" class="text-gray-400 text-sm hover:underline">ย้อนกลับไปหน้าคู่มือ</button>
        </div>
    </div>

    <script>
        // สร้าง QR Code จาก URL ปัจจุบัน
        // ในสถานการณ์จริง ระบบจะใช้ URL ของหน้า index.html
        const currentUrl = window.location.href.replace('qrcode-page.html', 'index.html');
        
        new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 256,
            height: 256,
            colorDark : "#1e40af",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
